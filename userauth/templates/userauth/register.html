<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Food Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --light-bg: #f8fafc;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .registration-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .registration-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 480px;
            width: 100%;
            overflow: hidden;
        }

        .registration-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .registration-header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .registration-header p {
            opacity: 0.9;
            font-size: 0.875rem;
        }

        .registration-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            background-color: white;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-control.is-valid {
            border-color: var(--success-color);
        }

        .form-control.is-invalid {
            border-color: var(--danger-color);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        .input-group .form-control:first-child {
            flex: 0 0 120px;
        }

        .input-group .form-control:last-child {
            flex: 1;
        }

        .password-requirements {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .password-requirements ul {
            list-style: none;
            padding: 0;
            margin: 0.25rem 0 0 0;
        }

        .password-requirements li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .password-requirements .check {
            color: var(--success-color);
        }

        .password-requirements .times {
            color: var(--danger-color);
        }

        .form-check {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-check-input {
            margin: 0;
            flex-shrink: 0;
        }

        .form-check-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .form-check-label a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .form-check-label a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            padding: 0.875rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background-color: var(--secondary-color);
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--border-color);
            z-index: 1;
        }

        .divider span {
            background-color: white;
            padding: 0 1rem;
            position: relative;
            z-index: 2;
        }

        .login-link {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .success-message {
            color: var(--success-color);
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        @media (max-width: 640px) {
            .registration-wrapper {
                padding: 1rem;
            }
            
            .registration-header,
            .registration-body {
                padding: 1.5rem;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .input-group .form-control:first-child {
                flex: none;
            }
        }
    </style>
</head>
<body>
    <div class="registration-wrapper">
        <div class="registration-container">
            <div class="registration-header">
                <h1>Create Account</h1>
                <p>Join Food Price Predictor to access market insights and predictions</p>
            </div>
            
            <div class="registration-body">
                <form method="post" id="registrationForm" novalidate>
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label class="form-label" for="first_name">First Name *</label>
                        <input type="text" class="form-control" id="first_name" name="first_name" required>
                        <div class="error-message" id="first_name_error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="last_name">Last Name *</label>
                        <input type="text" class="form-control" id="last_name" name="last_name" required>
                        <div class="error-message" id="last_name_error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="username">Username *</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                        <div class="error-message" id="username_error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address *</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                        <div class="error-message" id="email_error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Phone Number *</label>
                        <div class="input-group">
                            <select class="form-control" name="country_code" required>
                                <option value="+254">🇰🇪 +254</option>
                                <option value="+255">🇹🇿 +255</option>
                                <option value="+256">🇺🇬 +256</option>
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+44">🇬🇧 +44</option>
                            </select>
                            <input type="tel" class="form-control" name="phone_number" placeholder="742423200" required>
                        </div>
                        <div class="error-message" id="phone_error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password1">Password *</label>
                        <input type="password" class="form-control" id="password1" name="password1" required>
                        <div class="password-requirements">
                            <small>Password must contain:</small>
                            <ul id="password_requirements">
                                <li id="length_req"><i class="fas fa-times times"></i> At least 8 characters</li>
                                <li id="uppercase_req"><i class="fas fa-times times"></i> One uppercase letter</li>
                                <li id="lowercase_req"><i class="fas fa-times times"></i> One lowercase letter</li>
                                <li id="number_req"><i class="fas fa-times times"></i> One number</li>
                            </ul>
                        </div>
                        <div class="error-message" id="password1_error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password2">Confirm Password *</label>
                        <input type="password" class="form-control" id="password2" name="password2" required>
                        <div class="error-message" id="password2_error"></div>
                        <div class="success-message" id="password2_success"></div>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">
                            I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="submit_btn">
                        Create Account
                    </button>
                </form>
                
                <div class="divider">
                    <span>Already have an account?</span>
                </div>
                
                <div class="login-link">
                    <a href="{% url 'login' %}">Sign in to your account</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Form validation
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submit_btn');
        
        // Password validation
        const password1 = document.getElementById('password1');
        const password2 = document.getElementById('password2');
        
        password1.addEventListener('input', function() {
            const password = this.value;
            
            // Length check
            const lengthReq = document.getElementById('length_req');
            if (password.length >= 8) {
                lengthReq.innerHTML = '<i class="fas fa-check check"></i> At least 8 characters';
            } else {
                lengthReq.innerHTML = '<i class="fas fa-times times"></i> At least 8 characters';
            }
            
            // Uppercase check
            const uppercaseReq = document.getElementById('uppercase_req');
            if (/[A-Z]/.test(password)) {
                uppercaseReq.innerHTML = '<i class="fas fa-check check"></i> One uppercase letter';
            } else {
                uppercaseReq.innerHTML = '<i class="fas fa-times times"></i> One uppercase letter';
            }
            
            // Lowercase check
            const lowercaseReq = document.getElementById('lowercase_req');
            if (/[a-z]/.test(password)) {
                lowercaseReq.innerHTML = '<i class="fas fa-check check"></i> One lowercase letter';
            } else {
                lowercaseReq.innerHTML = '<i class="fas fa-times times"></i> One lowercase letter';
            }
            
            // Number check
            const numberReq = document.getElementById('number_req');
            if (/[0-9]/.test(password)) {
                numberReq.innerHTML = '<i class="fas fa-check check"></i> One number';
            } else {
                numberReq.innerHTML = '<i class="fas fa-times times"></i> One number';
            }
        });
        
        // Password confirmation
        password2.addEventListener('input', function() {
            const password1Value = password1.value;
            const password2Value = this.value;
            const errorDiv = document.getElementById('password2_error');
            const successDiv = document.getElementById('password2_success');
            
            if (password2Value && password1Value !== password2Value) {
                errorDiv.textContent = 'Passwords do not match';
                successDiv.textContent = '';
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
            } else if (password2Value && password1Value === password2Value) {
                errorDiv.textContent = '';
                successDiv.textContent = 'Passwords match';
                this.classList.remove('is-invalid');
                this.classList.add('is-valid');
            } else {
                errorDiv.textContent = '';
                successDiv.textContent = '';
                this.classList.remove('is-invalid', 'is-valid');
            }
        });
        
        // Form submission
        form.addEventListener('submit', function(e) {
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            submitBtn.disabled = true;
        });
        
        // Real-time validation for required fields
        document.querySelectorAll('input[required]').forEach(input => {
            input.addEventListener('blur', function() {
                if (this.value.trim()) {
                    this.classList.add('is-valid');
                    this.classList.remove('is-invalid');
                } else {
                    this.classList.add('is-invalid');
                    this.classList.remove('is-valid');
                }
            });
        });
    </script>
</body>
</html>
